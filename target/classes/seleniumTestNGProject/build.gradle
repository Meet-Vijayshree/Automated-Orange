dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.14.0'
    implementation 'io.github.bonigarcia:webdrivermanager:5.9.2'
}
plugins {
    id 'java'
    id 'application'
}

application {
    mainClass = 'guidona.hrms.LoginPage' // fully qualified class name
}
repositories {
    mavenCentral()
}